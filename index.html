<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>X 動態摘要</title>
    <style>
    :root {
      color-scheme: dark;
      --bg: #060816;
      --surface: rgba(10, 14, 30, 0.9);
      --border: rgba(98, 143, 255, 0.18);
      --border-strong: rgba(98, 143, 255, 0.38);
      --text: #e4eaff;
      --text-secondary: #7d93bc;
      --accent: #6fa3ff;
      --accent-dim: rgba(111, 163, 255, 0.1);
      --shadow-sm: 0 4px 20px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 24px 64px rgba(0, 0, 0, 0.55);
      --radius-lg: 18px;
      --radius-md: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      min-height: 100%;
      background:
        radial-gradient(ellipse 70% 45% at 8% 0%, rgba(50, 90, 200, 0.2), transparent),
        radial-gradient(ellipse 55% 35% at 92% 8%, rgba(90, 130, 240, 0.12), transparent),
        linear-gradient(180deg, #03040d 0%, var(--bg) 55%, #020308 100%);
    }
    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      background: transparent;
      line-height: 1.7;
    }
    .page { max-width: 960px; margin: auto; padding: 60px 40px 80px; }
    .hero {
      padding: 30px 28px 26px;
      border-radius: var(--radius-lg);
      background: linear-gradient(160deg, rgba(18, 28, 62, 0.97) 0%, rgba(7, 9, 20, 0.98) 100%);
      border: 1px solid var(--border-strong);
      box-shadow: var(--shadow-lg);
      margin-bottom: 22px;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid rgba(111, 163, 255, 0.22);
      border-radius: 100px;
      padding: 3px 12px;
      margin-bottom: 14px;
    }
    .hero h1 {
      font-size: clamp(1.7rem, 4vw, 2.6rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.1;
      color: #f0f4ff;
      margin-bottom: 10px;
    }
    .hero-desc { font-size: 0.92rem; color: var(--text-secondary); line-height: 1.65; margin-bottom: 5px; }
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 22px 24px;
      margin-bottom: 18px;
      box-shadow: var(--shadow-sm);
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .section-title { font-size: 0.95rem; font-weight: 700; color: #eef2ff; }
    .section-count {
      font-size: 0.7rem;
      color: var(--text-secondary);
      background: rgba(98, 143, 255, 0.08);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 2px 10px;
    }
    .item-list { display: flex; flex-direction: column; gap: 0; }
    .item {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(98, 143, 255, 0.08);
    }
    .item:last-child { border-bottom: none; padding-bottom: 0; }
    .item:first-child { padding-top: 0; }
    .item-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(111, 163, 255, 0.45);
      flex-shrink: 0;
      margin-top: 10px;
    }
    .item-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: row;
      gap: 16px;
      align-items: flex-start;
      justify-content: space-between;
    }
    .item-text { font-size: 0.88rem; color: var(--text); line-height: 1.7; }
    .item-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.75rem;
      color: var(--accent);
      text-decoration: none;
      opacity: 0.75;
      transition: opacity 0.15s;
      flex-shrink: 0;
      margin-top: 2px;
      white-space: nowrap;
    }
    .item-link:hover { opacity: 1; }
    .item-link::after { content: '↗'; font-size: 0.7rem; }
    .footer-grid { display: flex; flex-direction: column; gap: 18px; }
    .footer-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px 22px;
      box-shadow: var(--shadow-sm);
    }
    .footer-panel h2 {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }
    .footer-panel p { font-size: 0.88rem; color: var(--text); line-height: 1.7; }
    .tags { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 12px; }
    .tag {
      font-size: 0.73rem;
      color: var(--text-secondary);
      background: rgba(98, 143, 255, 0.07);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 3px 10px;
    }
    @media (max-width: 600px) {
      .page { padding: 20px 14px 60px; }
      .hero { padding: 22px 18px; }
      .section { padding: 18px 16px; }
      .item-body { flex-direction: column; gap: 8px; }
      .item-link { align-self: flex-start; margin-top: 0; }
    }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div class="hero-badge">📅 2026 年 4 月 13 日</div>
        <h1>X 動態摘要</h1>
        <p class="hero-desc">精選 0 則核心動態。</p>
      </section>

      

      <div class="footer-grid">
        <div class="footer-panel">
          <h2>📊 收集統計</h2>
          <p>本次共採集 <strong>0</strong> 條推文，精選 <strong>0</strong> 則核心動態。</p>
          <p style="margin-top: 7px; color: var(--text-secondary); font-size: 0.85rem;">來源：X ｜更新時間：00:40 UTC</p>
          <div class="tags">
            
          </div>
        </div>
        <div class="footer-panel">
          <h2>📝 今日總結</h2>
          <p>今天沒有足夠的內容可生成摘要。</p>
        </div>
      </div>
    </main>
  </body>
</html>
